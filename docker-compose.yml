version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fcp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fcp_user
      POSTGRES_PASSWORD: fcp_secret
      POSTGRES_DB: fcp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fcp_user -d fcp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: fcp_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: fcp_user
      MONGO_INITDB_ROOT_PASSWORD: fcp_secret
      MONGO_INITDB_DATABASE: fcp_nosql
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fcp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fcp_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://fcp_user:fcp_secret@postgres:5432/fcp_db
      - MONGODB_URL=mongodb://fcp_user:fcp_secret@mongodb:27017/fcp_nosql?authSource=admin
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=supersecretkey-change-in-production-please
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fcp_frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  mongo_data:
  redis_data:
